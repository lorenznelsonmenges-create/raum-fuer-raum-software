<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achtsam Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { surface: '#fbf9f3', 'surface-low': '#f5f4ec', 'surface-lowest': '#ffffff', primary: '#526447', 'primary-dim': '#46583c', 'primary-container': '#d4e9c4', 'on-surface': '#31332c' }, fontFamily: { headline: ['Noto Serif', 'serif'], body: ['Manrope', 'sans-serif'] } } } }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #fbf9f3; color: #31332c; font-family: 'Manrope', sans-serif; overflow: hidden; }
        .font-headline { font-family: 'Noto Serif', serif; }
        .sidebar-item.active { background-color: #f5f4ec; color: #526447; font-weight: 600; }
        .secondary-button { display: inline-flex; align-items: center; gap: 0.5rem; color: #526447; cursor: pointer; }
        .glass { background: rgba(251, 249, 243, 0.8); backdrop-filter: blur(12px); }
        input:focus, select:focus, textarea:focus { outline: none; background-color: #e3e3d9 !important; }
    </style>
</head>
<body x-data="app()" x-init="init()" class="h-screen flex text-on-surface" @click="searchOpen = false">

    <aside class="w-80 h-full bg-surface-lowest border-r border-surface-low flex flex-col py-12 px-6 font-body">
        <div class="flex items-center gap-4 mb-24 px-4 cursor-pointer" @click="view = 'dashboard'">
            <span class="font-headline text-3xl font-bold text-primary">A</span>
            <span class="font-headline text-xl font-bold text-primary">Achtsam</span>
        </div>
        <nav class="flex-1 space-y-2">
            <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'sidebar-item active' : 'sidebar-item'" class="w-full flex items-center gap-4 px-6 py-4 rounded-lg"><span class="material-icons-outlined">dashboard</span><span>Dashboard</span></button>
            <button @click="view = 'dokumente'" :class="view === 'dokumente' ? 'sidebar-item active' : 'sidebar-item'" class="w-full flex items-center gap-4 px-6 py-4 rounded-lg"><span class="material-icons-outlined">description</span><span>Dokumente</span></button>
            <button @click="view = 'kunden'" :class="view === 'kunden' ? 'sidebar-item active' : 'sidebar-item'" class="w-full flex items-center gap-4 px-6 py-4 rounded-lg"><span class="material-icons-outlined">people</span><span>Kunden</span></button>
            <button @click="view = 'auftraege'" :class="view === 'auftraege' ? 'sidebar-item active' : 'sidebar-item'" class="w-full flex items-center gap-4 px-6 py-4 rounded-lg"><span class="material-icons-outlined">assignment</span><span>Aufträge</span></button>
            <button @click="view = 'archiviert'" :class="view === 'archiviert' ? 'sidebar-item active' : 'sidebar-item'" class="w-full flex items-center gap-4 px-6 py-4 rounded-lg"><span class="material-icons-outlined">history</span><span>Archiv</span></button>
        </nav>
    </aside>

    <main class="flex-1 h-full overflow-y-auto px-16 py-16 no-scrollbar font-body" x-cloak>
        
        <!-- Dashboard -->
        <template x-if="view === 'dashboard'">
            <div>
                <header class="mb-24 flex justify-between">
                    <h1 class="font-headline text-5xl text-primary font-bold">Übersicht</h1>
                    <div class="relative w-96" @click.stop>
                        <input x-model="searchQuery" @input="searchOpen = true" placeholder="Suchen..." class="w-full bg-white border border-surface-low rounded-2xl p-4 shadow-sm">
                        <div x-show="searchOpen && searchQuery.length > 0" class="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl z-50 border border-surface-low overflow-hidden">
                            <template x-for="res in searchSuggestions" :key="res.key">
                                <div @click="handleSearchResult(res)" class="px-6 py-4 hover:bg-surface-low cursor-pointer border-b last:border-0 font-body">
                                    <div class="font-bold text-sm" x-text="res.title"></div>
                                    <div class="text-[10px] uppercase opacity-40 font-bold" x-text="res.subtitle"></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </header>
                <div class="grid grid-cols-2 gap-12 text-center">
                    <div @click="view = 'kunden'" class="bg-white p-12 rounded-3xl shadow-sm cursor-pointer hover:shadow-md transition-shadow"><div class="text-5xl font-headline text-primary font-bold" x-text="kunden.length"></div><p class="text-[10px] uppercase font-bold opacity-40">Kunden</p></div>
                    <div @click="view = 'auftraege'" class="bg-white p-12 rounded-3xl shadow-sm cursor-pointer hover:shadow-md transition-shadow"><div class="text-5xl font-headline text-primary font-bold" x-text="activeAuftraegeCount()"></div><p class="text-[10px] uppercase font-bold opacity-40">Aktive Projekte</p></div>
                </div>
            </div>
        </template>

        <!-- Dokumente -->
        <template x-if="view === 'dokumente'">
            <div>
                <div class="flex justify-between mb-16">
                    <h1 class="font-headline text-5xl text-primary font-bold">Dokumente</h1>
                    <button @click="$refs.tplUpload.click()" class="bg-primary text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase shadow-lg">Vorlage hochladen</button>
                    <input type="file" x-ref="tplUpload" class="hidden" @change="uploadTemplateFile($event)">
                </div>
                <div class="grid grid-cols-3 gap-12">
                    <template x-for="t in templates" :key="t">
                        <div class="bg-white p-10 rounded-[32px] shadow-sm flex flex-col h-full group hover:shadow-soft transition-all">
                            <h3 class="text-2xl font-headline font-bold mb-4 text-primary" x-text="t.toUpperCase()"></h3>
                            <div class="flex justify-between items-center mt-auto pt-6 border-t border-surface-low/50">
                                <button @click="openTemplateEditor(t)" class="bg-surface-low text-primary px-6 py-3 rounded-xl font-bold text-xs uppercase hover:bg-primary-container/40">Bearbeiten</button>
                                <button @click="deleteTemplateFile(t)" class="text-red-400 p-2 hover:bg-red-50 rounded-lg"><span class="material-icons-outlined text-sm">delete</span></button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Kunden Liste -->
        <template x-if="view === 'kunden'">
            <div>
                <div class="flex justify-between items-end mb-16">
                    <h1 class="font-headline text-4xl text-primary font-bold">Kundenverwaltung</h1>
                    <button @click="openNewKunde()" class="bg-primary text-white px-10 py-5 rounded-2xl font-bold shadow-lg">Neuer Kunde</button>
                </div>
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm">
                    <table class="w-full text-left font-body">
                        <thead class="bg-surface-low/50 text-[10px] font-bold uppercase opacity-40"><tr><th class="px-12 py-8">Nr.</th><th class="px-12 py-8">Name</th><th class="px-12 py-8"></th></tr></thead>
                        <tbody class="divide-y divide-surface-low">
                            <template x-for="k in filteredKunden" :key="k.id">
                                <tr class="hover:bg-surface-low cursor-pointer group" @click="openKundeDetail(k)">
                                    <td class="px-12 py-8 font-bold text-primary font-body" x-text="formatKundeID(k.id)"></td>
                                    <td class="px-12 py-8 text-xl font-bold" x-text="k.vorname + ' ' + k.nachname"></td>
                                    <td class="px-12 py-8 text-right"><span class="material-icons-outlined opacity-0 group-hover:opacity-100 transition-all text-primary">east</span></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>

        <!-- Kunde Detail -->
        <template x-if="view === 'kunde_detail'">
            <div class="space-y-12">
                <div class="secondary-button" @click="view = 'kunden'"><span class="material-icons-outlined text-xl">west</span><span>Zurück</span></div>
                <div class="bg-white p-16 rounded-[40px] shadow-soft font-body">
                    <header class="mb-12 flex justify-between items-start">
                        <div><div class="font-bold text-primary text-lg mb-2" x-text="formatKundeID(activeKunde.id)"></div><h1 class="font-headline text-5xl font-bold text-on-surface" x-text="activeKunde.vorname + ' ' + activeKunde.nachname"></h1></div>
                        <button @click="deleteKunde(activeKunde.id)" class="text-red-400 bg-red-50 px-6 py-3 rounded-2xl font-bold text-xs uppercase hover:bg-red-100 transition-all">Löschen</button>
                    </header>
                    <form @submit.prevent="saveKundeDetail()" class="space-y-8 pb-12 border-b border-surface-low">
                        <div class="grid grid-cols-2 gap-8"><input x-model="activeKunde.vorname" class="bg-surface-low p-4 rounded-xl border-none" placeholder="Vorname"><input x-model="activeKunde.nachname" class="bg-surface-low p-4 rounded-xl border-none" placeholder="Nachname"></div>
                        <div class="grid grid-cols-3 gap-8"><input x-model="activeKunde.strasse" class="col-span-2 bg-surface-low p-4 rounded-xl border-none" placeholder="Straße"><input x-model="activeKunde.hausnummer" class="bg-surface-low p-4 rounded-xl border-none" placeholder="Nr."></div>
                        <div class="grid grid-cols-3 gap-8"><input x-model="activeKunde.plz" class="bg-surface-low p-4 rounded-xl border-none" placeholder="PLZ"><input x-model="activeKunde.ort" class="col-span-2 bg-surface-low p-4 rounded-xl border-none" placeholder="Ort"></div>
                        <div class="grid grid-cols-2 gap-8"><input x-model="activeKunde.email" class="bg-surface-low p-4 rounded-xl border-none" placeholder="E-Mail"><input x-model="activeKunde.telefon" class="bg-surface-low p-4 rounded-xl border-none" placeholder="Telefon"></div>
                        <div class="flex justify-end"><button type="submit" class="bg-primary text-white px-12 py-5 rounded-2xl font-bold shadow-lg hover:bg-primary-dim transition-all">Stammdaten speichern</button></div>
                    </form>

                    <!-- Integrierte Projekt-Übersicht -->
                    <div class="mt-12 pt-12 border-t border-surface-low space-y-8">
                        <h3 class="font-headline text-2xl text-primary font-bold">Aktuelle Projekte</h3>
                        <div class="grid grid-cols-1 gap-3">
                            <template x-for="a in uniqueAuftraegeForKunde.filter(a => !isArchiv(a))" :key="a.id">
                                <div @click="openAuftragDetail(a)" class="flex items-center justify-between p-6 bg-surface-low/50 hover:bg-surface-low rounded-2xl cursor-pointer transition-all group">
                                    <div class="flex items-center gap-6">
                                        <span class="text-[10px] font-bold text-primary opacity-40" x-text="formatAuftragID(a.id)"></span>
                                        <span class="font-bold text-lg" x-text="a.beschreibung || 'Projekt ohne Titel'"></span>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <span :class="getStatusBadgeClass(a.status)" x-text="formatStatusLabel(a.status)"></span>
                                        <span class="material-icons-outlined text-primary opacity-0 group-hover:opacity-100 transition-all text-sm">east</span>
                                    </div>
                                </div>
                            </template>
                            <template x-if="uniqueAuftraegeForKunde.filter(a => !isArchiv(a)).length === 0">
                                <p class="text-sm italic opacity-30 py-4 text-center">Keine aktiven Projekte für diesen Kunden.</p>
                            </template>
                        </div>
                    </div>

                    <!-- Integrierte Notizen -->
                    <div class="mt-12 pt-12 border-t border-surface-low space-y-6">
                        <h3 class="font-headline text-2xl text-primary font-bold">Interne Notizen</h3>
                        <textarea x-model="activeKunde.notizen" class="w-full bg-surface-low/30 rounded-2xl p-8 text-sm border-none shadow-inner min-h-[150px] focus:ring-1 ring-primary/10 placeholder:opacity-20 font-body" placeholder="Hier können wichtige Informationen zum Kunden hinterlegt werden..."></textarea>
                    </div>
                </div>
            </div>
        </template>

        <!-- Auftragsverwaltung -->
        <template x-if="view === 'auftraege'">
            <div>
                <div class="flex justify-between items-end mb-16">
                    <h1 class="font-headline text-4xl text-primary font-bold">Aktive Projekte</h1>
                    <button @click="openAuftragErstellung()" class="bg-primary text-white px-10 py-5 rounded-2xl font-bold shadow-lg">Neues Projekt</button>
                </div>
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm">
                    <table class="w-full text-left font-body">
                        <thead class="bg-surface-low text-[10px] font-bold uppercase opacity-40"><tr><th class="px-12 py-8">Nr.</th><th class="px-12 py-8">Kunde</th><th class="px-12 py-8">Status</th><th class="px-12 py-8"></th></tr></thead>
                        <tbody class="divide-y divide-surface-low">
                            <template x-for="a in uniqueFilteredAuftraege.filter(a => !isArchiv(a))" :key="a.id">
                                <tr class="hover:bg-surface-low transition-all cursor-pointer group" @click="openAuftragDetail(a)">
                                    <td class="px-12 py-8 font-bold text-primary font-body" x-text="formatAuftragID(a.id)"></td>
                                    <td class="px-12 py-8 text-xl font-bold font-body" x-text="getKundeName(a.kunde_id)"></td>
                                    <td class="px-12 py-8"><span :class="getStatusBadgeClass(a.status)" x-text="formatStatusLabel(a.status)"></span></td>
                                    <td class="px-12 py-8 text-right opacity-0 group-hover:opacity-100 transition-opacity"><span class="material-icons-outlined text-primary font-body">east</span></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>

        <!-- Auftrag Detail -->
        <template x-if="view === 'auftrag_detail'">
            <div class="space-y-12 font-body">
                <div class="secondary-button" @click="view = 'auftraege'"><span class="material-icons-outlined text-xl">west</span><span>Auftragsverwaltung</span></div>
                <header class="flex justify-between items-center bg-surface-low/30 p-8 rounded-[32px] border border-surface-low shadow-sm">
                    <div class="flex gap-12 items-baseline text-on-surface">
                        <div><p class="text-[9px] font-bold uppercase opacity-30">Kunde</p><h1 class="text-3xl font-headline font-bold text-primary" x-text="activeKundeForAuftrag.vorname + ' ' + activeKundeForAuftrag.nachname"></h1></div>
                        <div><p class="text-[9px] font-bold uppercase opacity-30">Kunde-Nr</p><div class="text-xl font-bold" x-text="formatKundeID(activeKundeForAuftrag.id)"></div></div>
                        <div><p class="text-[9px] font-bold uppercase opacity-30">Auftrag-Nr</p><div class="text-xl font-bold text-primary" x-text="formatAuftragID(activeAuftrag.id)"></div></div>
                    </div>
                    <select x-model="activeAuftrag.status" @change="updateAuftragSync()" :class="getStatusBadgeClass(activeAuftrag.status)" class="pl-8 pr-12 py-5 rounded-2xl appearance-none border-none font-bold uppercase text-[11px] tracking-widest cursor-pointer shadow-xl transition-all">
                        <option value="AnfrageLaeuft">Anfrage läuft</option><option value="InBearbeitung">In Bearbeitung</option><option value="Abgeschlossen">Abgeschlossen</option><option value="Storniert">Storniert</option>
                    </select>
                </header>

                <div class="grid grid-cols-2 gap-12">
                    <div class="bg-white p-8 rounded-3xl border border-surface-low shadow-sm"><div class="flex justify-between border-b pb-4 mb-4"><h2 class="font-headline text-2xl text-primary font-bold">Arbeit</h2><button @click="addWork('ARBEIT')" class="bg-primary text-white px-4 py-2 rounded-xl font-bold text-xs shadow-sm">+ Std.</button></div><template x-for="e in activeEinsaetze.filter(e => e.typ === 'ARBEIT')"><div class="p-4 border-b last:border-0 flex justify-between items-center text-on-surface"><div><div class="font-bold" x-text="formatDate(e.datum)"></div><div class="text-xs opacity-40" x-text="e.notiz"></div></div><div class="font-headline text-xl text-primary font-bold" x-text="e.stunden + 'h'"></div><button @click="deleteEinsatz(e.id)" class="p-2 text-red-400 opacity-20 hover:opacity-100 transition-opacity"><span class="material-icons-outlined text-sm">delete</span></button></div></template></div>
                    <div class="bg-white p-8 rounded-3xl border border-surface-low shadow-sm"><div class="flex justify-between border-b pb-4 mb-4"><h2 class="font-headline text-2xl text-primary font-bold">Fahrten</h2><button @click="addWork('FAHRT')" class="bg-primary text-white px-4 py-2 rounded-xl font-bold text-xs shadow-sm">+ Fahrt</button></div><template x-for="e in activeEinsaetze.filter(e => e.typ === 'FAHRT')"><div class="p-4 border-b last:border-0 flex justify-between items-center text-on-surface"><div><div class="font-bold" x-text="formatDate(e.datum)"></div><div class="text-xs opacity-40" x-text="e.notiz"></div></div><div class="font-headline text-xl text-primary font-bold" x-text="e.kilometer + 'km'"></div><button @click="deleteEinsatz(e.id)" class="p-2 text-red-400 opacity-20 hover:opacity-100 transition-opacity"><span class="material-icons-outlined text-sm">delete</span></button></div></template></div>
                </div>

                <div class="bg-white p-10 rounded-[40px] border border-surface-low shadow-sm">
                    <div class="flex justify-between items-center mb-8"><h2 class="font-headline text-2xl text-primary font-bold">Dokumente & Rechnungen</h2><div class="flex gap-3"><button @click="showTemplateModal = true" class="bg-primary text-white px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-md">+ Vorlage</button><button @click="$refs.fileInput.click()" class="bg-surface-low text-primary px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-sm">+ Datei</button></div></div>
                    <input type="file" x-ref="fileInput" class="hidden" @change="handleFileUpload($event)">
                    <table class="w-full text-left font-body text-on-surface">
                        <tbody class="divide-y divide-surface-low text-sm font-body">
                            <template x-for="d in activeDateien" :key="d.id"><tr class="hover:bg-surface-low transition-all font-body font-bold"><td class="py-6 font-bold" x-text="d.dateiname"></td><td class="py-6 font-bold text-primary uppercase text-[10px]" x-text="d.kategorie"></td><td class="py-6 text-right flex justify-end gap-3"><a :href="'/' + d.dateipfad" target="_blank" class="p-3 text-primary bg-surface-low rounded-xl transition-all"><span class="material-icons-outlined text-sm">visibility</span></a><button @click="deleteDoc(d.id)" class="p-3 text-red-400 bg-red-50 rounded-xl transition-all hover:bg-red-100"><span class="material-icons-outlined text-sm">delete</span></button></td></tr></template>
                        </tbody>
                    </table>
                </div>

                <section class="bg-primary p-10 rounded-[40px] shadow-2xl text-white font-body">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-12">
                        <div class="flex-1 grid grid-cols-3 gap-12 items-center text-center">
                            <div class="space-y-1"><span class="text-white/40 text-[9px] font-bold uppercase">Std. gesamt</span><div class="text-4xl font-headline font-bold text-white" x-text="totalStunden()"></div></div>
                            <div class="space-y-1"><span class="text-white/40 text-[9px] font-bold uppercase">KM gesamt</span><div class="text-4xl font-headline font-bold text-white" x-text="totalKM()"></div></div>
                            <div class="space-y-2"><label class="text-[9px] font-bold uppercase text-white/40 block">Pauschale (€)</label><input x-model.number="activeAuftrag.basis_pauschale" @blur="updateAuftragSync()" class="w-full bg-white/10 border-none rounded-xl px-4 py-3 text-2xl font-headline font-bold text-white text-center shadow-inner" type="number" step="10" min="0"></div>
                        </div>
                        <button @click="createInvoice()" class="md:w-auto px-12 bg-white text-primary py-6 rounded-[24px] font-bold text-xl flex items-center justify-center gap-4 hover:scale-[1.03] transition-all shadow-xl font-body font-bold text-primary">Rechnung generieren</button>
                    </div>
                </section>
            </div>
        </template>
    </main>

    <!-- Archiv -->
    <template x-if="view === 'archiviert'">
        <div>
            <h1 class="font-headline text-4xl text-primary font-bold mb-16">Abgeschlossene Projekte</h1>
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm font-body">
                <table class="w-full text-left font-body">
                    <thead class="bg-surface-low text-[10px] font-bold uppercase opacity-40"><tr><th class="px-12 py-8">Nr.</th><th class="px-12 py-8">Kunde</th><th class="px-12 py-8">Status</th><th class="px-12 py-8"></th></tr></thead>
                    <tbody class="divide-y divide-surface-low text-on-surface">
                        <template x-for="a in auftraege.filter(a => isArchiv(a))" :key="a.id">
                            <tr class="hover:bg-surface-low transition-all cursor-pointer group" @click="openAuftragDetail(a)">
                                <td class="px-12 py-8 font-bold text-primary font-body" x-text="formatAuftragID(a.id)"></td>
                                <td class="px-12 py-8 text-xl font-bold font-body" x-text="getKundeName(a.kunde_id)"></td>
                                <td class="px-12 py-8"><span :class="getStatusBadgeClass(a.status)" x-text="formatStatusLabel(a.status)"></span></td>
                                <td class="px-12 py-8 text-right opacity-0 group-hover:opacity-100 transition-opacity"><span class="material-icons-outlined text-primary font-body">east</span></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <!-- Modals -->
    <div x-show="templateEditorOpen" class="fixed inset-0 z-[200] flex items-center justify-center p-8 glass" x-cloak><div class="bg-white w-full max-w-5xl h-[90vh] rounded-[48px] p-16 relative flex flex-col shadow-2xl text-on-surface font-body"><button @click="templateEditorOpen = false" class="absolute top-10 right-10 text-on-surface/20 transition-all font-body"><span class="material-icons-outlined text-4xl">close</span></button><h2 class="font-headline text-4xl mb-8 text-primary font-bold" x-text="'Vorlage: ' + editingTemplateName"></h2><textarea x-model="editingTemplateContent" class="flex-1 bg-surface-low p-10 rounded-3xl font-mono text-sm border-none shadow-inner no-scrollbar text-on-surface"></textarea><div class="pt-8 flex justify-end gap-6 font-bold font-body"><button @click="templateEditorOpen = false" class="text-xs uppercase opacity-40">Abbrechen</button><button @click="saveTemplateContent()" class="bg-primary text-white px-12 py-5 rounded-2xl font-bold shadow-xl hover:bg-primary-dim transition-all">Speichern</button></div></div></div>
    
    <div x-show="newKundeModal" class="fixed inset-0 z-[100] flex items-center justify-center p-8 glass" x-cloak><div class="bg-surface-lowest w-full max-w-2xl rounded-[48px] p-12 relative shadow-2xl text-on-surface font-body"><button @click="newKundeModal = false" class="absolute top-10 right-10 text-on-surface/20 transition-all font-body"><span class="material-icons-outlined text-4xl">close</span></button><h2 class="font-headline text-4xl mb-10 text-primary font-bold">Neuer Kundenkontakt</h2><form @submit.prevent="createNewKunde()" class="space-y-8 font-body"><div class="grid grid-cols-2 gap-8"><div class="space-y-2"><label class="text-[9px] font-bold uppercase tracking-widest text-on-surface/40 px-1 font-body">Vorname *</label><input x-model="newKundeData.vorname" class="w-full bg-surface-low border-none rounded-xl px-6 py-4" required></div><div class="space-y-2"><label class="text-[9px] font-bold uppercase tracking-widest text-on-surface/40 px-1 font-body">Nachname *</label><input x-model="newKundeData.nachname" class="w-full bg-surface-low border-none rounded-xl px-6 py-4" required></div></div><div class="grid grid-cols-3 gap-8 text-on-surface"><div class="col-span-2 space-y-2"><label class="text-[9px] font-bold uppercase tracking-widest text-on-surface/40 px-1 font-body">Straße</label><input x-model="newKundeData.strasse" class="w-full bg-surface-low border-none rounded-xl px-6 py-4"></div><div class="space-y-2"><label class="text-[9px] font-bold uppercase tracking-widest text-on-surface/40 px-1 font-body">Nr.</label><input x-model="newKundeData.hausnummer" class="w-full bg-surface-low border-none rounded-xl px-6 py-4"></div></div><div class="grid grid-cols-3 gap-8 text-on-surface"><div class="space-y-2"><label class="text-[9px] font-bold uppercase tracking-widest text-on-surface/40 px-1 font-body">PLZ</label><input x-model="newKundeData.plz" class="w-full bg-surface-low border-none rounded-xl px-6 py-4"></div><div class="col-span-2 space-y-2"><label class="text-[9px] font-bold uppercase tracking-widest text-on-surface/40 px-1 font-body">Ort</label><input x-model="newKundeData.ort" class="w-full bg-surface-low border-none rounded-xl px-6 py-4"></div></div><button type="submit" class="w-full bg-primary text-white py-6 rounded-3xl font-bold text-xl shadow-xl hover:bg-primary-dim transition-all mt-4 font-bold font-body">Kunden anlegen</button></form></div></div>

    <div x-show="newAuftragModal" class="fixed inset-0 z-[100] flex items-center justify-center p-8 glass" x-cloak><div class="bg-surface-lowest w-full max-w-2xl rounded-[48px] p-20 relative shadow-2xl text-on-surface text-center font-body"><button @click="newAuftragModal = false" class="absolute top-10 right-10 text-on-surface/20 font-body"><span class="material-icons-outlined text-4xl">close</span></button><h2 class="font-headline text-4xl mb-12 text-primary font-bold">Neues Projekt starten</h2><select x-model.number="newAuftragKundeID" class="w-full bg-surface-low p-6 rounded-2xl mb-12 appearance-none text-center shadow-inner"><option value="">-- Kunden auswählen --</option><template x-for="k in kunden" :key="k.id"><option :value="k.id" x-text="k.vorname + ' ' + k.nachname"></option></template></select><button @click="createNewAuftrag()" class="w-full bg-primary text-white py-6 rounded-3xl font-bold text-xl shadow-xl">Projekt anlegen</button></div></div>
    
    <div x-show="showTemplateModal" class="fixed inset-0 z-[110] flex items-center justify-center p-8 glass" x-cloak><div class="bg-white w-full max-w-lg rounded-[48px] p-12 relative shadow-2xl text-on-surface font-body"><button @click="showTemplateModal = false" class="absolute top-10 right-10 text-on-surface/20 font-body"><span class="material-icons-outlined text-4xl">close</span></button><h2 class="font-headline text-4xl mb-12 text-primary font-bold text-center">Vorlage nutzen</h2><div class="space-y-4"><template x-for="t in templates" :key="t"><button @click="generateDocFromTemplate(t)" class="w-full p-8 text-left bg-surface-low hover:bg-primary-container rounded-[24px] flex items-center gap-6 transition-all font-bold text-xl"><span class="material-icons-outlined text-primary text-3xl">picture_as_pdf</span><span x-text="t.toUpperCase().replace('.HTML','')"></span></button></template></div></div></div>

    <script>
        function app() {
            return {
                view: 'dashboard', kunden: [], auftraege: [], templates: [], searchQuery: '', searchOpen: false, activeKunde: null, activeAuftrag: null, activeKundeForAuftrag: { vorname: '?', nachname: '' }, activeEinsaetze: [], activeDateien: [], showTemplateModal: false, openArbeitsForm: false, openFahrtForm: false, newKundeModal: false, newKundeData: { vorname: '', nachname: '', strasse: '', hausnummer: '', plz: '', ort: '', email: '', telefon: '', notizen: '' }, newAuftragModal: false, newAuftragKundeID: null, templateEditorOpen: false, editingTemplateName: '', editingTemplateContent: '',
                async init() { await this.fetchKunden(); await this.fetchAuftraege(); await this.fetchTemplates(); },
                async fetchTemplates() { this.templates = await (await fetch('/api/templates')).json(); },
                async fetchKunden() { this.kunden = await (await fetch('/api/kunden')).json(); },
                async fetchAuftraege() { this.auftraege = await (await fetch('/api/auftraege')).json(); },
                async openTemplateEditor(n) { this.editingTemplateName = n; this.editingTemplateContent = await (await fetch(`/api/templates/${n}`)).text(); this.templateEditorOpen = true; },
                async saveTemplateContent() { const r = await fetch(`/api/templates/${this.editingTemplateName}`, { method: 'POST', body: this.editingTemplateContent }); if (r.ok) { this.templateEditorOpen = false; alert("Gespeichert."); } },
                async deleteTemplateFile(n) { if (confirm("Löschen?")) { await fetch(`/api/templates/${n}`, { method: 'DELETE' }); await this.fetchTemplates(); } },
                async uploadTemplateFile(e) { const f = e.target.files[0]; if (f) { const fd = new FormData(); fd.append('file', f); await fetch('/api/templates', { method: 'POST', body: fd }); await this.fetchTemplates(); } },
                activeAuftraegeCount() { return this.auftraege.filter(a => !this.isArchiv(a)).length; },
                archivedAuftraegeCount() { return this.auftraege.filter(a => this.isArchiv(a)).length; },
                isArchiv(a) { if(!a) return false; return a.status === 'Abgeschlossen' || a.status === 'Storniert'; },
                getStatusBadgeClass(s) { const b = "px-4 py-1.5 text-[9px] font-bold uppercase tracking-widest rounded-full font-body "; if (s === 'AnfrageLaeuft') return b + "bg-gray-100 text-gray-600"; if (s === 'InBearbeitung') return b + "bg-amber-100 text-amber-700"; if (s === 'Abgeschlossen') return b + "bg-green-100 text-green-700"; if (s === 'Storniert') return b + "bg-red-100 text-red-700"; return b + "bg-surface-low text-on-surface/40"; },
                formatStatusLabel(s) { if (s === 'AnfrageLaeuft') return "Anfrage läuft"; if (s === 'InBearbeitung') return "In Bearbeitung"; return s; },
                get searchSuggestions() { if (!this.searchQuery) return []; const q = this.searchQuery.toLowerCase(); const r = []; this.kunden.forEach(k => { if (k.vorname.toLowerCase().includes(q) || k.nachname.toLowerCase().includes(q) || this.formatKundeID(k.id).toLowerCase().includes(q)) r.push({ type: 'kunde', key: 'k_'+k.id, title: k.vorname+' '+k.nachname, subtitle: this.formatKundeID(k.id), data: k }); }); this.auftraege.forEach(a => { const kn = this.getKundeName(a.kunde_id).toLowerCase(); if (kn.includes(q) || this.formatAuftragID(a.id).toLowerCase().includes(q)) r.push({ type: 'auftrag', key: 'a_'+a.id, title: this.getKundeName(a.kunde_id), subtitle: this.formatAuftragID(a.id), data: a }); }); return r.slice(0, 5); },
                handleSearchResult(res) { this.searchOpen = false; this.searchQuery = ''; if (res.type === 'kunde') this.openKundeDetail(res.data); else this.openAuftragDetail(res.data); },
                get filteredKunden() { const q = this.searchQuery.toLowerCase(); return this.kunden.filter(k => k.vorname.toLowerCase().includes(q) || k.nachname.toLowerCase().includes(q)); },
                get uniqueFilteredAuftraege() { const q = this.searchQuery.toLowerCase(); return this.auftraege.filter(a => this.getKundeName(a.kunde_id).toLowerCase().includes(q)); },
                get uniqueAuftraegeForKunde() { if (!this.activeKunde) return []; return this.auftraege.filter(a => a.kunde_id === this.activeKunde.id); },
                formatKundeID(id) { return 'K' + String(id).padStart(6, '0'); },
                formatAuftragID(id) { return 'A' + String(id).padStart(6, '0'); },
                async deleteKunde(id) { if (confirm("Kunde wirklich löschen?")) { await fetch(`/api/kunden/${id}/delete`, { method: 'POST' }); this.view = 'kunden'; await this.fetchKunden(); } },
                async deleteDoc(id) { if (confirm("Löschen?")) { await fetch(`/api/dateien/${id}/delete`, { method: 'POST' }); await this.fetchDateien(this.activeAuftrag.id); } },
                getKundeName(id) { const k = this.kunden.find(k => k.id === id); return k ? k.vorname + ' ' + k.nachname : 'Unbekannt'; },
                formatDate(d) { return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' }); },
                totalStunden() { if(!this.activeEinsaetze) return '0'; return this.activeEinsaetze.filter(e=>e.typ==='ARBEIT').reduce((s, e) => s + e.stunden, 0); },
                totalKM() { if(!this.activeEinsaetze) return '0'; return this.activeEinsaetze.filter(e=>e.typ==='FAHRT').reduce((s, e) => s + e.kilometer, 0); },
                openNewKunde() { this.newKundeData = { vorname: '', nachname: '', strasse: '', hausnummer: '', plz: '', ort: '', email: '', telefon: '', notizen: '' }; this.newKundeModal = true; },
                async createNewKunde() { const res = await fetch('/api/kunden', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.newKundeData) }); if (res.ok) { this.newKundeModal = false; await this.fetchKunden(); alert("Kunde angelegt!"); } },
                openKundeDetail(k) { this.activeKunde = JSON.parse(JSON.stringify(k)); this.view = 'kunde_detail'; },
                async saveKundeDetail() { const res = await fetch(`/api/kunden/${this.activeKunde.id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.activeKunde) }); if (res.ok) { await this.fetchKunden(); alert("Gespeichert."); } },
                openAuftragErstellung(kid = null) { this.newAuftragKundeID = kid; this.newAuftragModal = true; },
                async createNewAuftrag() { const res = await fetch('/api/auftraege', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: 0, kunde_id: this.newAuftragKundeID, status: 'AnfrageLaeuft', beschreibung: '', basis_pauschale: 0, stundensatz: 45.0, kilometer_satz: 0.5, notizen: '', einsaetze: [], dateien: [], rechnungen: [], rechnungs_notizen: [] }) }); if (res.ok) { await this.fetchAuftraege(); this.newAuftragModal = false; const a = this.auftraege.find(a => a.kunde_id === this.newAuftragKundeID); if(a) this.openAuftragDetail(a); } },
                async openAuftragDetail(a) { this.activeAuftrag = a; this.activeKundeForAuftrag = this.kunden.find(k => k.id === a.kunde_id) || { vorname: '?', nachname: '' }; await this.fetchEinsaetze(a.id); await this.fetchDateien(a.id); this.view = 'auftrag_detail'; },
                async fetchEinsaetze(id) { this.activeEinsaetze = await (await fetch(`/api/auftraege/${id}/einsaetze`)).json(); },
                async fetchDateien(id) { this.activeDateien = await (await fetch(`/api/auftraege/${id}/dateien`)).json(); },
                async handleFileUpload(e) { if (e.target.files[0]) { const fd = new FormData(); fd.append('file', e.target.files[0]); fd.append('kategorie', 'SONSTIGES'); await fetch(`/api/auftraege/${this.activeAuftrag.id}/upload`, { method: 'POST', body: fd }); await this.fetchDateien(this.activeAuftrag.id); } },
                async addWork(t) { const s = prompt(t === 'ARBEIT' ? "Stunden:" : "Kilometer:"); if(s) { const payload = { id: 0, auftrag_id: this.activeAuftrag.id, datum: new Date().toISOString().split('T')[0], stunden: t === 'ARBEIT' ? parseFloat(s) : 0, kilometer: t === 'FAHRT' ? parseFloat(s) : 0, notiz: '', typ: t, signatur_pfad: null }; await fetch('/api/einsaetze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); await this.fetchEinsaetze(this.activeAuftrag.id); } },
                async deleteEinsatz(id) { if (confirm("Löschen?")) { await fetch(`/api/einsaetze/${id}/delete`, { method: 'POST' }); await this.fetchEinsaetze(this.activeAuftrag.id); } },
                async generateDocFromTemplate(t) { const r = await fetch(`/api/auftraege/${this.activeAuftrag.id}/generate_doc`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ template: t }) }); if (r.ok) { this.showTemplateModal = false; await this.fetchDateien(this.activeAuftrag.id); alert("Erfolgreich erstellt!"); } },
                async updateAuftragSync() { await fetch(`/api/auftraege/${this.activeAuftrag.id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.activeAuftrag) }); await this.fetchAuftraege(); },
                async createInvoice() { if (confirm("Rechnung generieren?")) { await fetch(`/api/auftraege/${this.activeAuftrag.id}/rechnung`, { method: 'POST' }); await this.fetchAuftraege(); await this.openAuftragDetail(this.auftraege.find(a => a.id === this.activeAuftrag.id)); } }
            }
        }
    </script>
</body>
</html>
